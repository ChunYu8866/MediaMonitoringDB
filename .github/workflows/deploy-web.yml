name: Update news snapshot and deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'src/**'
      - 'tests/**'
      - 'config/**'
      - 'worker/**'
      - 'requirements.txt'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

# 只允許一個執行中與最新一個等待中的部署，且不取消進行中的工作，避免互相覆寫
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 安裝 Python 相依套件
        run: pip install -r requirements.txt

      - name: Python 測試
        run: python -m pytest -q
        env:
          PYTHONPATH: src

      - name: 更新官方 RSS 與 Google Trends TW 快照
        run: python -m opinion_pipeline.cli --restore-base-url https://chunyu8866.github.io/MediaMonitoringDB
        env:
          PYTHONPATH: src

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            worker/package-lock.json

      - name: 安裝 Worker 相依套件
        run: npm ci
        working-directory: worker

      - name: Worker 核心測試
        run: npm test
        working-directory: worker

      - name: 安裝前端相依套件
        run: npm ci
        working-directory: web

      - name: 前端單元測試
        run: npm test
        working-directory: web

      - name: 型別檢查
        run: npm run typecheck
        working-directory: web

      - name: 建置
        run: npm run build
        working-directory: web
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
